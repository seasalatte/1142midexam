{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<article>
    <header><h2>⚠️{{ title }}</h2></header>
    <p>{{ message }}</p>
    <footer>
        <a href="javascript:history.back()" role="button">← 返回前一頁</a>
        <a href="{{ url_for('index') }}" role="button" class="secondary">🏠 返回首頁</a>
    </footer>
</article>
{% endblock %}
