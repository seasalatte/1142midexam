{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<article>
    <h2>✏️編輯 {{ user.username }}</h2>
    <form method="post">
        <label>帳號 <input type="text" value="{{ user.username }}" readonly class="disabled-input"><small>帳號不可修改</small></label>
        <label>Email <input type="email" value="{{ user.email }}" readonly class="disabled-input"><small>Email不可修改</small></label>
        <label>電話 (選填) <input type="tel" name="phone" placeholder="{{ user.phone or '09XXXXXXXX' }}"></label>
        <label>密碼(選填,修改時填寫) <input type="password" name="password" placeholder="******"></label>
        <label>出生日期 <input type="date" name="birthdate" value="{{ user.birthdate }}"></label>
        <button type="submit">更新資料</button>
    </form>
</article>
{% endblock %}
